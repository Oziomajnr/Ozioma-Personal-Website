name: Build and deploy Jekyll site to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=12288 --no-deprecation"
      ACTIONS_STEP_DEBUG: true
      ACTIONS_RUNNER_DEBUG: true
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.1'
          bundler-cache: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          cd blog
          echo running gem update --system
          gem update --system
          echo running gem install bundler
          gem install bundler
          echo running bundler update --bundler
          bundler update --bundler
          echo running gem install jekyll bundler
          gem install jekyll bundler
          JEKYLL_ENV=production bundle exec jekyll build --verbose
          cd ..
          ls
      - name: Verify build output
        run: |
          echo "Checking build artifacts..."
          ls -la blog/_site/ || (echo "ERROR: blog/_site not found" && exit 1)
          ls -la index.html || (echo "ERROR: index.html not found" && exit 1)
      - name: Deploy website to Firebase Hosting
        uses: w9jds/firebase-action@v15.11.0
        with:
          args: deploy --only hosting:website --non-interactive --force
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          NODE_OPTIONS: "--max-old-space-size=12288 --no-deprecation"
      - name: Deploy blog to Firebase Hosting
        uses: w9jds/firebase-action@v15.11.0
        with:
          args: deploy --only hosting:blog --non-interactive --force
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          NODE_OPTIONS: "--max-old-space-size=12288 --no-deprecation"
